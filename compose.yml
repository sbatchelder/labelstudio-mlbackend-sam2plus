# Shared base for the real instances: same image, GPU reservation, and a
# dependency on the ephemeral build helper completing. The image tag is
# anchored here so sam2-build can reference it too.
x-instance: &instance
  image: &sam2-image ${SAM2_IMAGE:-sam2plus:local}
  restart: unless-stopped
  depends_on:
    sam2-build:
      condition: service_completed_successfully
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            device_ids: ['${HOST_GPU:-0}']
            capabilities: [ gpu ]
  environment:
    - MODEL_DIR=/data/models

services:
  sam2-build:
    # Ephemeral helper: builds and names the shared image, then populates the
    # MODEL_STORE volume with the SAM2 checkpoints before exiting 0 so
    # brick/ichthyolith (which gate on its successful completion) only start
    # once the checkpoints exist. Self-terminating -- it does not linger.
    image: *sam2-image
    build:
      context: .
      args:
        # false (default) = slim image, checkpoints downloaded below into
        # MODEL_STORE. true = bake them into the image (run without a
        # MODEL_STORE mount, which would otherwise shadow them).
        BAKE_CHECKPOINTS: ${BAKE_CHECKPOINTS:-false}
    entrypoint: ["/bin/sh", "-lc"]
    # Download into the rw-mounted MODEL_STORE only if the configured
    # checkpoint is missing, so repeat `up`s are fast. The script (copied to
    # PATH in the Dockerfile) fetches all four hiera sizes.
    command:
      - |
        cd /sam2/checkpoints
        if [ -f "${MODEL_CHECKPOINT:-sam2.1_hiera_large.pt}" ]; then
          echo "✓ ${MODEL_CHECKPOINT:-sam2.1_hiera_large.pt} present -- skipping checkpoint download"
        else
          echo "downloading SAM2 checkpoints into MODEL_STORE…"
          download-checkpoints.sh
        fi
    restart: "no"
    volumes:
      - "${MODEL_STORE:-./vols/model-store}:/sam2/checkpoints:rw"

  brick:
    <<: *instance
    container_name: SAM2Plus-brick
    env_file:
      - .env
      - envs/brick.env
    ports:
      - "22203:9090"
    volumes:
      - "./vols/brick/server:/data"
      - "./vols/brick/cache:/cache"
      - "${MODEL_STORE:-./vols/model-store}:/sam2/checkpoints:ro"

  ichthyolith:
    <<: *instance
    container_name: SAM2Plus-ichthyolith
    env_file:
      - .env
      - envs/ichthyolith.env
    ports:
      - "22202:9090"
    volumes:
      - "./vols/ichthyolith/server:/data"
      - "./vols/ichthyolith/cache:/cache"
      - "${MODEL_STORE:-./vols/model-store}:/sam2/checkpoints:ro"
